<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Kalahari Comfort Hotel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Kalahari Comfort Hotel</a>
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link active" href="booking.html">Booking</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>
</div>
</nav>
</header>

<main class="container my-5">
<h2 class="text-center">Book Your Stay</h2>

<form>

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">
<label>Check-in Date</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label>Check-out Date</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label>Room Type</label>
<select class="form-control">
<option>Single Room</option>
<option>Double Room</option>
<option>Luxury Suite</option>
</select>
</div>

<button type="submit" class="btn btn-success">Book Now</button>

</form>

</main>

<footer class="text-center bg-dark text-white p-3">
<p>© 2026 Kalahari Comfort Hotel</p>
</footer>

</body>
</html>
